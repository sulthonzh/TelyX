receivers:
  otlp:
    endpoint: 0.0.0.0:4317
    protocols:
      grpc:
        include_metadata: true

processors:
  batch:
    timeout: 1s

exporters:
  logging:
    loglevel: info
    sampling:
      probability: 1.0

  # Jaeger exporter (uncomment when Jaeger is available)
  # jaeger:
  #   endpoint: jaeger:14250
  #   tls:
  #     insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
      # exporters: [batch, logging, jaeger]  # Uncomment for Jaeger