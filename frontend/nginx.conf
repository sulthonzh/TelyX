server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy backend routes directly
    location /health {
        proxy_pass http://backend:8080/health;
    }

    location /logs/search {
        proxy_pass http://backend:8080/logs/search;
    }

    location /logs {
        proxy_pass http://backend:8080/logs;
    }

    location /metrics {
        proxy_pass http://backend:8080/metrics;
    }
}
