receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:55681
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  logging:
    loglevel: warn

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
